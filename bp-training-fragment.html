<!-- ===== Blood Pressure Training widget (paste into a Custom HTML / Embed block) ===== -->
<style>
    :root {
      --bg: #f3f5f9;
      --surface: #ffffff;
      --ink: #1a2233;
      --muted: #5b6478;
      --line: #e3e7ef;
      --accent: #2c6ef2;
      --accent-deep: #1a4fbf;
      --danger: #d23b3b;
      --good: #1f9d55;
      --gauge-face: #f8f6ef;
      --gauge-ring: #2a2f3a;
      --needle: #b8232b;
    }

    /* Scope everything to the widget so it can't clash with a host page. */
    #bp-app * { box-sizing: border-box; }

    #bp-app {
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        Helvetica, Arial, sans-serif;
      position: relative;
      min-height: 100%;
    }
    /* Force the font onto every element so the host page's own h1/p/button
       rules can't override the widget's typography. */
    #bp-app, #bp-app * {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        Helvetica, Arial, sans-serif;
    }
    /* Re-assert monospace for the readout/gauge labels (higher specificity). */
    #bp-app .pressure-readout,
    #bp-app .pressure-readout *,
    #bp-app .tick-label {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
    }

    #bp-app h1, #bp-app h2, #bp-app h3 { margin: 0 0 0.5rem; font-weight: 600; }
    #bp-app p { line-height: 1.5; }

    /* ---------- Instructor page ---------- */
    #bp-app .instructor-page {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    #bp-app .card {
      background: var(--surface);
      border-radius: 14px;
      padding: 2.5rem;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 10px 40px rgba(20, 30, 60, 0.08);
    }

    #bp-app .card h1 { font-size: 1.75rem; }

    /* Corner logo */
    #bp-app .corner-logo {
      position: absolute;
      top: 1rem;
      left: 1rem;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      background: white;
      box-shadow: 0 2px 8px rgba(20, 30, 60, 0.2);
      z-index: 100;
    }

    #bp-app .subtitle {
      color: var(--accent);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.8rem;
      margin: 0 0 1rem;
    }

    #bp-app .hint {
      color: var(--muted);
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
    }

    /* Inputs */
    #bp-app .bp-inputs {
      display: flex;
      align-items: flex-end;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    #bp-app .bp-inputs label {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 500;
    }

    #bp-app .bp-inputs input,
    #bp-app .full-row input {
      font-size: 1.5rem;
      padding: 0.6rem 0.8rem;
      border: 1.5px solid var(--line);
      border-radius: 8px;
      width: 100%;
      text-align: center;
      font-variant-numeric: tabular-nums;
      transition: border-color 0.15s ease;
      background: white;
      color: var(--ink);
    }

    #bp-app .bp-inputs input:focus,
    #bp-app .full-row input:focus {
      outline: none;
      border-color: var(--accent);
    }

    #bp-app .slash {
      font-size: 2rem;
      color: var(--muted);
      padding-bottom: 0.3rem;
    }

    #bp-app .full-row {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 500;
      margin-bottom: 1.25rem;
    }

    #bp-app .full-row input {
      font-size: 1.15rem;
      max-width: 200px;
    }

    #bp-app .error-msg {
      color: var(--danger);
      font-size: 0.9rem;
      min-height: 1.2em;
      margin: 0.25rem 0 0.75rem;
    }

    /* Buttons */
    #bp-app .primary-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.85rem 1.25rem;
      font-size: 1rem;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background 0.15s ease, transform 0.05s ease;
    }
    #bp-app .primary-btn:hover { background: var(--accent-deep); }
    #bp-app .primary-btn:active { transform: translateY(1px); }

    #bp-app .secondary-btn {
      background: transparent;
      color: var(--accent);
      border: 1.5px solid var(--accent);
      padding: 0.75rem 1.25rem;
      font-size: 0.95rem;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-top: 0.6rem;
      transition: background 0.15s ease, color 0.15s ease, transform 0.05s ease;
    }
    #bp-app .secondary-btn:hover { background: var(--accent); color: white; }
    #bp-app .secondary-btn:active { transform: translateY(1px); }

    #bp-app .ghost-btn {
      background: transparent;
      color: var(--muted);
      border: 1.5px solid var(--line);
      padding: 0.6rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      width: 100%;
      margin-top: 0.5rem;
    }
    #bp-app .ghost-btn:hover { color: var(--ink); border-color: var(--muted); }

    /* ---------- Student page ---------- */
    #bp-app .student-page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.5rem 3rem;
    }

    #bp-app .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      gap: 1rem;
      flex-wrap: wrap;
      padding-left: 84px;
    }
    #bp-app .top-bar h1 { font-size: 1.5rem; }

    #bp-app .back-link {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
      cursor: pointer;
    }
    #bp-app .back-link:hover { text-decoration: underline; }

    #bp-app .instructions {
      background: #eef3ff;
      border: 1px solid #d6e0ff;
      color: #1b2a4e;
      padding: 0.9rem 1.1rem;
      border-radius: 10px;
      font-size: 0.92rem;
      margin-bottom: 1.5rem;
    }
    #bp-app .instructions p { margin: 0; }
    #bp-app .instructions em { color: #1a4fbf; font-style: normal; font-weight: 600; }

    #bp-app .exercise-grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 1.5rem;
    }

    @media (max-width: 820px) {
      #bp-app .exercise-grid { grid-template-columns: 1fr; }
    }

    #bp-app .gauge-panel,
    #bp-app .controls-panel {
      background: var(--surface);
      border-radius: 14px;
      padding: 1.5rem;
      box-shadow: 0 6px 24px rgba(20, 30, 60, 0.06);
    }

    /* Gauge */
    #bp-app .gauge-wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #bp-app .gauge {
      width: 100%;
      max-width: 360px;
      height: auto;
      display: block;
    }

    #bp-app .gauge-bg { fill: var(--gauge-face); }
    #bp-app .gauge-ring {
      fill: none;
      stroke: var(--gauge-ring);
      stroke-width: 6;
    }

    #bp-app .tick { stroke: #1f2530; stroke-width: 1.5; }
    #bp-app .tick.major { stroke-width: 2.5; }
    #bp-app .tick-label {
      fill: #1f2530;
      font-size: 11px;
      font-weight: 600;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    #bp-app .gauge-label {
      fill: var(--muted);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    #bp-app .gauge-brand {
      fill: #a3a8b0;
      font-size: 9px;
      letter-spacing: 0.2em;
    }

    #bp-app .needle {
      stroke: var(--needle);
      stroke-width: 4;
      stroke-linecap: round;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.2));
    }

    #bp-app .needle-cap { fill: #2a2f3a; }

    #bp-app .pressure-readout {
      margin-top: 0.5rem;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 1.6rem;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
    }
    #bp-app .readout-unit {
      font-size: 0.85rem;
      color: var(--muted);
      margin-left: 0.3rem;
    }
    #bp-app .pressure-readout.hidden { visibility: hidden; }

    #bp-app .readout-toggle {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 0.4rem;
      font-size: 0.8rem;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }
    #bp-app .readout-toggle input { cursor: pointer; }

    /* Controls */
    #bp-app .controls-panel h2 {
      font-size: 0.85rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.75rem;
    }

    #bp-app .control-group { margin-bottom: 1.5rem; }

    #bp-app .pump-btn,
    #bp-app .valve-btn {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.2rem;
      padding: 1rem 1.2rem;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      margin-bottom: 0.75rem;
      text-align: left;
      transition: transform 0.05s ease, background 0.15s ease;
    }

    #bp-app .pump-btn { background: #1f2937; color: white; }
    #bp-app .pump-btn:hover { background: #2a3744; }
    #bp-app .pump-btn:active { transform: scale(0.98); }

    #bp-app .valve-btn {
      background: #f0f2f7;
      color: var(--ink);
      border: 1.5px solid var(--line);
    }
    #bp-app .valve-btn[aria-pressed="true"] {
      background: #fff3e1;
      border-color: #ffb84d;
      color: #8a4a00;
    }
    #bp-app .valve-btn:hover { background: #e7eaf0; }

    #bp-app .btn-title { font-size: 1.05rem; font-weight: 600; }
    #bp-app .btn-sub { font-size: 0.78rem; opacity: 0.75; font-weight: 400; }

    #bp-app .answer-group form .primary-btn { margin-top: 0.5rem; }

    #bp-app .feedback {
      margin-top: 1rem;
      padding: 0.9rem 1rem;
      border-radius: 10px;
      font-size: 0.95rem;
      line-height: 1.45;
    }
    #bp-app .feedback.correct {
      background: #e6f7ee;
      border: 1px solid #b6e2c8;
      color: #135a30;
    }
    #bp-app .feedback.close {
      background: #fff5e0;
      border: 1px solid #f0d99a;
      color: #6b4d00;
    }
    #bp-app .feedback.wrong {
      background: #fdebeb;
      border: 1px solid #f3bdbd;
      color: #842121;
    }

    #bp-app [hidden] { display: none !important; }
  </style>
</head>

    <main class="instructor-page" id="setup-view">
      <div class="card">
        <h1>Blood Pressure Training</h1>
        <p class="subtitle">Instructor Setup</p>
        <p class="hint">
          Enter the target blood pressure the student should auscultate.
          The student will then practice measuring it with a virtual sphygmomanometer.
        </p>

        <form id="setup-form">
          <div class="bp-inputs">
            <label>
              <span>Systolic (mmHg)</span>
              <input type="number" id="systolic" name="systolic"
                     min="60" max="260" value="120" required />
            </label>
            <span class="slash">/</span>
            <label>
              <span>Diastolic (mmHg)</span>
              <input type="number" id="diastolic" name="diastolic"
                     min="30" max="160" value="80" required />
            </label>
          </div>

          <label class="full-row">
            <span>Heart rate (bpm)</span>
            <input type="number" id="heart-rate" name="heart-rate"
                   min="40" max="140" value="72" required />
          </label>

          <p id="error" class="error-msg" role="alert"></p>

          <button type="submit" class="primary-btn">Start Student Exercise &rarr;</button>
          <button type="button" id="practice-btn" class="secondary-btn">
            <svg viewBox="0 0 24 24" width="17" height="17" aria-hidden="true"
                 style="vertical-align:-3px;margin-right:6px">
              <rect x="3.5" y="3.5" width="17" height="17" rx="3.5"
                    fill="none" stroke="currentColor" stroke-width="1.5" />
              <circle cx="8" cy="8" r="1.6" fill="currentColor" />
              <circle cx="16" cy="8" r="1.6" fill="currentColor" />
              <circle cx="12" cy="12" r="1.6" fill="currentColor" />
              <circle cx="8" cy="16" r="1.6" fill="currentColor" />
              <circle cx="16" cy="16" r="1.6" fill="currentColor" />
            </svg>Student Practice (Randomize)
          </button>
        </form>
      </div>
    </main>

    <!-- ===================== EXERCISE VIEW ===================== -->
    <main class="student-page" id="exercise-view" hidden>
      <header class="top-bar">
        <h1>Take the Patient's Blood Pressure</h1>
        <a id="back-link" class="back-link">&larr; Back to setup</a>
      </header>

      <div class="exercise-grid">
        <section class="gauge-panel">
          <div class="gauge-wrapper">
            <svg viewBox="0 0 300 300" class="gauge" id="gauge">
              <circle cx="150" cy="150" r="140" class="gauge-bg" />
              <circle cx="150" cy="150" r="140" class="gauge-ring" />
              <g id="tick-marks"></g>
              <g id="tick-labels"></g>
              <text x="150" y="220" text-anchor="middle" class="gauge-label">mmHg</text>
              <text x="150" y="245" text-anchor="middle" class="gauge-brand">SPHYG-100</text>
              <g id="needle-group" transform="rotate(-135 150 150)">
                <line x1="150" y1="150" x2="150" y2="50" class="needle" />
              </g>
              <circle cx="150" cy="150" r="10" class="needle-cap" />
            </svg>
            <div class="pressure-readout" id="pressure-readout">
              <span id="pressure-value">0</span>
              <span class="readout-unit">mmHg</span>
            </div>
            <label class="readout-toggle">
              <input type="checkbox" id="readout-toggle" />
              <span>Show digital readout</span>
            </label>
          </div>
        </section>

        <section class="controls-panel">
          <div class="control-group">
            <h2>Controls</h2>
            <button id="pump-btn" class="pump-btn" type="button">
              <span class="btn-title">Pump</span>
              <span class="btn-sub">+ ~15 mmHg per squeeze</span>
            </button>

            <button id="valve-btn" class="valve-btn" type="button" aria-pressed="false">
              <span class="btn-title">Open Valve</span>
              <span class="btn-sub">Click to deflate slowly</span>
            </button>

            <button id="reset-btn" class="ghost-btn" type="button">Reset cuff</button>
          </div>

          <div class="answer-group">
            <h2>Your Reading</h2>
            <form id="answer-form">
              <div class="bp-inputs">
                <label>
                  <span>Systolic</span>
                  <input type="number" id="ans-systolic" min="0" max="300" required />
                </label>
                <span class="slash">/</span>
                <label>
                  <span>Diastolic</span>
                  <input type="number" id="ans-diastolic" min="0" max="300" required />
                </label>
              </div>
              <button type="submit" class="primary-btn">Submit reading</button>
            </form>

            <div id="feedback" class="feedback" hidden></div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script>
  (() => {
    const app = document.getElementById('bp-app');
    const $ = (id) => app.querySelector('#' + id);

    // ===================== View switching =====================
    const setupView = $('setup-view');
    const exerciseView = $('exercise-view');

    // ===================== Setup form =====================
    const form = $('setup-form');
    const errorEl = $('error');
    const randInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
    // Sphygmomanometers resolve to even numbers (2 mmHg marks), so round to even.
    const randEven = (min, max) => randInt(min / 2, max / 2) * 2;

    $('practice-btn').addEventListener('click', () => {
      const sys = randEven(90, 180);
      const pulse = randEven(30, 60);
      const dia = Math.max(50, sys - pulse);
      const hr = randInt(55, 95);
      startExercise(sys, dia, hr);
    });

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const sys = parseInt($('systolic').value, 10);
      const dia = parseInt($('diastolic').value, 10);
      const hr = parseInt($('heart-rate').value, 10);
      errorEl.textContent = '';
      if (Number.isNaN(sys) || Number.isNaN(dia) || Number.isNaN(hr)) {
        errorEl.textContent = 'Please enter valid numbers for all fields.';
        return;
      }
      if (sys <= dia) {
        errorEl.textContent = 'Systolic pressure must be greater than diastolic pressure.';
        return;
      }
      if (sys - dia < 10) {
        errorEl.textContent = 'Pulse pressure should be at least 10 mmHg.';
        return;
      }
      startExercise(sys, dia, hr);
    });

    $('back-link').addEventListener('click', (e) => {
      e.preventDefault();
      exerciseView.hidden = true;
      setupView.hidden = false;
      resetCuff();
    });

    // ===================== Exercise state =====================
    let systolic = 120, diastolic = 80, heartRate = 72; // set on start
    let pressure = 0;
    const MAX_PRESSURE = 300;
    const PUMP_PER_CLICK = 15;
    const DEFLATE_RATE = 2.5;
    const LEAK_RATE = 0.05;

    let valveOpen = false;
    let korotkoffGain = null;
    const MAX_KOROTKOFF_GAIN = 6;
    let korotkoffLevel = 1.0; // fixed at max — loud on laptop speakers
    let lastFrameTime = performance.now();
    let lastBeatTime = 0;
    let displayedAngle = -135;
    const beatInterval = () => 60000 / heartRate;

    // ----- Elements -----
    const needleGroup = $('needle-group');
    const pressureValue = $('pressure-value');
    const pumpBtn = $('pump-btn');
    const valveBtn = $('valve-btn');
    const resetBtn = $('reset-btn');
    const answerForm = $('answer-form');
    const feedbackEl = $('feedback');
    const readout = $('pressure-readout');
    const readoutToggle = $('readout-toggle');

    // Digital readout hidden by default; reveal via checkbox.
    readout.classList.toggle('hidden', !readoutToggle.checked);
    readoutToggle.addEventListener('change', () => {
      readout.classList.toggle('hidden', !readoutToggle.checked);
    });

    // ----- Draw gauge ticks (every 2 mmHg) -----
    const tickG = $('tick-marks');
    const labelG = $('tick-labels');
    const CENTER = 150, OUTER_R = 134, TICK_MAJOR_LEN = 14, TICK_MINOR_LEN = 7;
    const LABEL_R = 110, START_ANGLE_DEG = -135, SWEEP_DEG = 270;

    function pressureToAngle(p) {
      return START_ANGLE_DEG + (p / MAX_PRESSURE) * SWEEP_DEG;
    }
    function polar(cx, cy, r, angleDeg) {
      const a = (angleDeg - 90) * Math.PI / 180;
      return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) };
    }
    for (let p = 0; p <= MAX_PRESSURE; p += 2) {
      const isMajor = p % 10 === 0;
      const angle = pressureToAngle(p);
      const outer = polar(CENTER, CENTER, OUTER_R, angle);
      const inner = polar(CENTER, CENTER, OUTER_R - (isMajor ? TICK_MAJOR_LEN : TICK_MINOR_LEN), angle);
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', outer.x);
      line.setAttribute('y1', outer.y);
      line.setAttribute('x2', inner.x);
      line.setAttribute('y2', inner.y);
      line.setAttribute('class', 'tick' + (isMajor ? ' major' : ''));
      tickG.appendChild(line);
      if (p % 20 === 0) {
        const lp = polar(CENTER, CENTER, LABEL_R, angle);
        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', lp.x);
        text.setAttribute('y', lp.y);
        text.setAttribute('class', 'tick-label');
        text.textContent = p;
        labelG.appendChild(text);
      }
    }

    // ----- Audio (Web Audio API) -----
    let audioCtx = null;
    let masterGain = null;
    function ensureAudio() {
      if (audioCtx) return;
      const Ctx = window.AudioContext || window.webkitAudioContext;
      audioCtx = new Ctx();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 1.0;
      const limiter = audioCtx.createDynamicsCompressor();
      limiter.threshold.value = -3;
      limiter.knee.value = 6;
      limiter.ratio.value = 12;
      limiter.attack.value = 0.002;
      limiter.release.value = 0.12;
      masterGain.connect(limiter);
      limiter.connect(audioCtx.destination);
      korotkoffGain = audioCtx.createGain();
      korotkoffGain.gain.value = korotkoffLevel * MAX_KOROTKOFF_GAIN;
      korotkoffGain.connect(masterGain);
    }

    let noiseBuffer = null;
    function getNoiseBuffer() {
      if (noiseBuffer) return noiseBuffer;
      const len = audioCtx.sampleRate * 0.3;
      noiseBuffer = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
      const data = noiseBuffer.getChannelData(0);
      let last = 0;
      for (let i = 0; i < len; i++) {
        const white = Math.random() * 2 - 1;
        last = (last + 0.02 * white) / 1.02;
        data[i] = last * 4;
      }
      return noiseBuffer;
    }

    function playKorotkoff(intensity, phase) {
      if (!audioCtx) return;
      const t = audioCtx.currentTime;
      const noise = audioCtx.createBufferSource();
      noise.buffer = getNoiseBuffer();
      const noiseFilter = audioCtx.createBiquadFilter();
      noiseFilter.type = 'bandpass';
      if (phase === 'muffled') {
        noiseFilter.frequency.value = 55;
        noiseFilter.Q.value = 2.5;
      } else {
        noiseFilter.frequency.value = 90;
        noiseFilter.Q.value = 3.5;
      }
      const noiseGain = audioCtx.createGain();
      const peak = 0.95 * intensity;
      noiseGain.gain.setValueAtTime(0, t);
      noiseGain.gain.linearRampToValueAtTime(peak, t + 0.005);
      noiseGain.gain.exponentialRampToValueAtTime(0.0005, t + (phase === 'muffled' ? 0.18 : 0.11));
      noise.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(korotkoffGain);
      noise.start(t);
      noise.stop(t + 0.3);

      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      const startFreq = phase === 'muffled' ? 70 : 95;
      osc.frequency.setValueAtTime(startFreq, t);
      osc.frequency.exponentialRampToValueAtTime(35, t + 0.12);
      const oscGain = audioCtx.createGain();
      const oscPeak = 0.6 * intensity;
      oscGain.gain.setValueAtTime(0, t);
      oscGain.gain.linearRampToValueAtTime(oscPeak, t + 0.008);
      oscGain.gain.exponentialRampToValueAtTime(0.0005, t + 0.14);
      osc.connect(oscGain);
      oscGain.connect(korotkoffGain);
      osc.start(t);
      osc.stop(t + 0.2);
    }

    let bgNoiseNode = null;
    function startBackgroundHiss() {
      if (!audioCtx || bgNoiseNode) return;
      const bufferSize = audioCtx.sampleRate * 2;
      const buf = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.04;
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      src.loop = true;
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 400;
      const g = audioCtx.createGain();
      g.gain.value = 0.06;
      src.connect(filter);
      filter.connect(g);
      g.connect(masterGain);
      src.start();
      bgNoiseNode = src;
    }

    // ----- Korotkoff phase logic (with fade in/out) -----
    const FADE_MMHG = 7;
    function korotkoffFor(p) {
      if (p >= systolic || p <= diastolic) return null;
      const range = systolic - diastolic;
      const pos = (p - diastolic) / range;
      let intensity, phase = 'tap';
      if (pos > 0.85) intensity = 0.55 + (1 - pos) * 1.5;
      else if (pos > 0.35) intensity = 0.95;
      else if (pos > 0.1) { intensity = 0.65; phase = 'muffled'; }
      else { intensity = 0.35; phase = 'muffled'; }
      const fadeIn = Math.min(1, (systolic - p) / FADE_MMHG);
      const fadeOut = Math.min(1, (p - diastolic) / FADE_MMHG);
      intensity *= fadeIn * fadeOut;
      if (intensity < 0.02) return null;
      return { intensity: Math.min(1, intensity), phase };
    }

    // ----- Render loop -----
    function setPressure(p) {
      pressure = Math.max(0, Math.min(MAX_PRESSURE, p));
      pressureValue.textContent = Math.round(pressure);
    }

    function tick(now) {
      const dt = (now - lastFrameTime) / 1000;
      lastFrameTime = now;
      if (pressure > 0) {
        let drop = LEAK_RATE * dt;
        if (valveOpen) drop += DEFLATE_RATE * dt;
        setPressure(pressure - drop);
      }
      const targetAngle = pressureToAngle(pressure);
      displayedAngle += (targetAngle - displayedAngle) * Math.min(1, dt * 8);
      needleGroup.setAttribute('transform', `rotate(${displayedAngle.toFixed(3)} 150 150)`);
      if (audioCtx && now - lastBeatTime >= beatInterval()) {
        lastBeatTime = now;
        const k = korotkoffFor(pressure);
        if (k) playKorotkoff(k.intensity, k.phase);
      }
      requestAnimationFrame(tick);
    }
    requestAnimationFrame((t) => { lastFrameTime = t; lastBeatTime = t; tick(t); });

    // ----- Controls -----
    pumpBtn.addEventListener('click', () => {
      ensureAudio();
      startBackgroundHiss();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const delta = PUMP_PER_CLICK + (Math.random() * 6 - 3);
      setPressure(pressure + delta);
    });

    valveBtn.addEventListener('click', () => {
      ensureAudio();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      valveOpen = !valveOpen;
      valveBtn.setAttribute('aria-pressed', String(valveOpen));
      valveBtn.querySelector('.btn-title').textContent = valveOpen ? 'Close Valve' : 'Open Valve';
      valveBtn.querySelector('.btn-sub').textContent = valveOpen ? 'Deflating slowly…' : 'Click to deflate slowly';
    });

    function resetCuff() {
      setPressure(0);
      valveOpen = false;
      valveBtn.setAttribute('aria-pressed', 'false');
      valveBtn.querySelector('.btn-title').textContent = 'Open Valve';
      valveBtn.querySelector('.btn-sub').textContent = 'Click to deflate slowly';
    }
    resetBtn.addEventListener('click', resetCuff);

    // ----- Answer submission -----
    answerForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const ansSys = parseInt($('ans-systolic').value, 10);
      const ansDia = parseInt($('ans-diastolic').value, 10);
      if (Number.isNaN(ansSys) || Number.isNaN(ansDia)) return;
      const sysErr = Math.abs(ansSys - systolic);
      const diaErr = Math.abs(ansDia - diastolic);
      const maxErr = Math.max(sysErr, diaErr);
      feedbackEl.hidden = false;
      feedbackEl.classList.remove('correct', 'close', 'wrong');
      if (maxErr === 0) {
        feedbackEl.classList.add('correct');
        feedbackEl.innerHTML = `<strong>Perfect.</strong> Exact reading: ${systolic}/${diastolic} mmHg.`;
      } else if (maxErr <= 4) {
        feedbackEl.classList.add('correct');
        feedbackEl.innerHTML = `<strong>Excellent.</strong> You read ${ansSys}/${ansDia}; actual was ${systolic}/${diastolic} mmHg. Within clinical tolerance.`;
      } else if (maxErr <= 10) {
        feedbackEl.classList.add('close');
        feedbackEl.innerHTML = `<strong>Close.</strong> You read ${ansSys}/${ansDia}; actual was ${systolic}/${diastolic} mmHg. ${sysErr > 4 ? `Systolic off by ${sysErr} mmHg. ` : ''}${diaErr > 4 ? `Diastolic off by ${diaErr} mmHg. ` : ''}Try deflating more slowly next time.`;
      } else {
        feedbackEl.classList.add('wrong');
        feedbackEl.innerHTML = `<strong>Off the mark.</strong> You read ${ansSys}/${ansDia}; actual was ${systolic}/${diastolic} mmHg. Re-inflate above ${systolic + 30} mmHg and listen carefully as you release. Systolic = first Korotkoff sound; diastolic = where they disappear.`;
      }
    });

    // ===================== Start / reset an exercise =====================
    function startExercise(sys, dia, hr) {
      systolic = sys; diastolic = dia; heartRate = hr;
      resetCuff();
      displayedAngle = -135;
      feedbackEl.hidden = true;
      feedbackEl.classList.remove('correct', 'close', 'wrong');
      $('ans-systolic').value = '';
      $('ans-diastolic').value = '';
      setupView.hidden = true;
      exerciseView.hidden = false;
    }

    setPressure(0);
  })();
  </script>
