<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BP Training — Instructor</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <img
    src="emtref-01-1.jpg"
    alt="NJ Association of EMS Educators"
    class="corner-logo"
  />
  <main class="instructor-page">
    <div class="card">
      <h1>Blood Pressure Training</h1>
      <p class="subtitle">Instructor Setup</p>
      <p class="hint">
        Enter the target blood pressure the student should auscultate.
        The student will then practice measuring it with a virtual sphygmomanometer.
      </p>

      <form id="setup-form">
        <div class="bp-inputs">
          <label>
            <span>Systolic (mmHg)</span>
            <input
              type="number"
              id="systolic"
              name="systolic"
              min="60"
              max="260"
              value="120"
              required
            />
          </label>
          <span class="slash">/</span>
          <label>
            <span>Diastolic (mmHg)</span>
            <input
              type="number"
              id="diastolic"
              name="diastolic"
              min="30"
              max="160"
              value="80"
              required
            />
          </label>
        </div>

        <label class="full-row">
          <span>Heart rate (bpm)</span>
          <input
            type="number"
            id="heart-rate"
            name="heart-rate"
            min="40"
            max="140"
            value="72"
            required
          />
        </label>

        <p id="error" class="error-msg" role="alert"></p>

        <button type="submit" class="primary-btn">Start Student Exercise &rarr;</button>
        <button type="button" id="practice-btn" class="secondary-btn">
          🎲 Student Practice (Randomize)
        </button>
      </form>
    </div>
  </main>

  <script>
    const form = document.getElementById('setup-form');
    const errorEl = document.getElementById('error');

    // Student practice: generate a clinically plausible random BP + HR,
    // then launch straight into the exercise.
    const randInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
    // Sphygmomanometers resolve to even numbers (2 mmHg marks), so round to even.
    const randEven = (min, max) => randInt(min / 2, max / 2) * 2;

    document.getElementById('practice-btn').addEventListener('click', () => {
      const systolic = randEven(90, 180);
      // Keep a realistic pulse pressure (30–60) without exceeding the diastolic floor.
      const pulsePressure = randEven(30, 60);
      const diastolic = Math.max(50, systolic - pulsePressure);
      const heartRate = randInt(55, 95);

      // Write straight to sessionStorage and navigate — never populate the
      // visible inputs, so the student never glimpses the randomized values.
      sessionStorage.setItem('bp_systolic', String(systolic));
      sessionStorage.setItem('bp_diastolic', String(diastolic));
      sessionStorage.setItem('bp_hr', String(heartRate));

      window.location.href = 'student.html';
    });

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const systolic = parseInt(document.getElementById('systolic').value, 10);
      const diastolic = parseInt(document.getElementById('diastolic').value, 10);
      const heartRate = parseInt(document.getElementById('heart-rate').value, 10);

      errorEl.textContent = '';

      if (Number.isNaN(systolic) || Number.isNaN(diastolic) || Number.isNaN(heartRate)) {
        errorEl.textContent = 'Please enter valid numbers for all fields.';
        return;
      }
      if (systolic <= diastolic) {
        errorEl.textContent = 'Systolic pressure must be greater than diastolic pressure.';
        return;
      }
      if (systolic - diastolic < 10) {
        errorEl.textContent = 'Pulse pressure should be at least 10 mmHg.';
        return;
      }

      sessionStorage.setItem('bp_systolic', String(systolic));
      sessionStorage.setItem('bp_diastolic', String(diastolic));
      sessionStorage.setItem('bp_hr', String(heartRate));

      window.location.href = 'student.html';
    });
  </script>
</body>
</html>
